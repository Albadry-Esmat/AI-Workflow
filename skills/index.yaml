skills:
- id: SKL-001
  name: Requirement Analysis
  short_description: Extract, normalize, and validate requirements from unstructured raw input
  reference_path: skills/knowledge/requirement-analysis.md
  reference_sections:
  - '## Principles'
  - '## Anti-patterns'
  - '## Source References'
  executable_skill: .opencode/skills/requirement-analyzer/SKILL.md
  tags:
  - requirements
  - analysis
  - ambiguity
  - clarification
  - normalization
  - invest
  version: 1.2.0
  depends_on: []
  mastery_level: intermediate
  use_when: 'Starting any new feature, epic, or system change where requirements are unclear, unstructured, or assumed.

    '
  do_not_use_when: 'Requirements are already fully specified, validated, and unambiguous with no open questions.

    '
- id: SKL-002
