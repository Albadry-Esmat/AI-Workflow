  - architecture
  - ddd
  - solid
  - modules
  - design
  - boundaries
  - clean-architecture
  version: 1.3.0
  depends_on:
  - SKL-001
  mastery_level: advanced
  use_when: 'Translating validated requirements into a concrete system structure with explicit module boundaries and integration
    contracts.

    '
  do_not_use_when: 'Requirements are incomplete or contain open questions — resolve SKL-001 first.

    '
