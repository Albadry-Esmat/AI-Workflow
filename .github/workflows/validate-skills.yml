name: Validate Skills

on:
  push:
    paths:
      - "skills/**"
      - ".opencode/skills/**"
      - "opencode.json"
  pull_request:
    paths:
      - "skills/**"
      - ".opencode/skills/**"
      - "opencode.json"

jobs:
  validate:
    name: Skill Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install ajv-cli (JSON Schema validator)
        run: npm install -g ajv-cli ajv-formats

      - name: Validate pipeline configs against pipeline-schema.json
        run: |
          echo "=== Validating pipeline configs ==="
          for f in skills/pipelines/*.json; do
            echo "Checking $f ..."
            ajv validate \
              -s skills/schema/pipeline-schema.json \
              -d "$f" \
              --spec=draft7 \
              --allow-union-types \
              && echo "  PASS: $f" \
              || { echo "  FAIL: $f"; exit 1; }
          done

      - name: Check all SKILL.md files have required sections
        run: |
          echo "=== Checking SKILL.md section headers (13-section template) ==="
          # Keyword patterns that match the actual ## headings used in every pipeline SKILL.md
          REQUIRED_SECTIONS=(
            "Purpose"
            "Inputs"
            "Required Context"
            "Execution Logic"
            "Outputs"
            "Rules"
            "Security"
            "Token Optim"
            "Quality Check"
            "Failure"
            "Human-in-the-Loop"
            "Skill Composition"
          )
          # Meta-format skills use a non-standard layout and are exempted from the 13-section check
          META_SKILLS=(
            "context-memory"
            "observability"
            "quality-scoring"
            "skill-lifecycle"
            "trigger-engineering"
            "validation-rules"
            "versioning"
          )
          FAILED=0
          for skill_dir in .opencode/skills/*/; do
            skill_name=$(basename "$skill_dir")
            skill_file="${skill_dir}SKILL.md"
            # Skip meta-format skills
            skip=0
            for meta in "${META_SKILLS[@]}"; do
              [ "$skill_name" = "$meta" ] && skip=1 && break
            done
            if [ "$skip" -eq 1 ]; then
              echo "  SKIP (meta-format): $skill_file"
              continue
            fi
            if [ ! -f "$skill_file" ]; then
              echo "  MISSING: $skill_file"
              FAILED=1
              continue
            fi
            missing=()
            for section in "${REQUIRED_SECTIONS[@]}"; do
              if ! grep -qi "$section" "$skill_file"; then
                missing+=("$section")
              fi
            done
            if [ "${#missing[@]}" -eq 0 ]; then
              echo "  PASS: $skill_file"
            else
              echo "  FAIL: $skill_file missing sections: ${missing[*]}"
              FAILED=1
            fi
          done
          [ "$FAILED" -eq 0 ] || exit 1

      - name: Check all index.yaml skill IDs are unique
        run: |
          echo "=== Checking index.yaml for duplicate IDs ==="
          DUPES=$(grep "^- id:" skills/index.yaml | sort | uniq -d || true)
          if [ -n "$DUPES" ]; then
            echo "  FAIL: Duplicate skill IDs found:"
            echo "$DUPES"
            exit 1
          fi
          echo "  PASS: All skill IDs are unique"

      - name: Check index.yaml skill count matches .opencode/skills/ directory count
        run: |
          echo "=== Checking skill count consistency ==="
          INDEX_COUNT=$(grep -c "^- id:" skills/index.yaml || echo 0)
          DIR_COUNT=$(ls -d .opencode/skills/*/ 2>/dev/null | wc -l | tr -d ' ')
          echo "  index.yaml entries : $INDEX_COUNT"
          echo "  .opencode/skills/  : $DIR_COUNT"
          if [ "$INDEX_COUNT" -ne "$DIR_COUNT" ]; then
            echo "  FAIL: Count mismatch — index.yaml ($INDEX_COUNT) vs .opencode/skills/ ($DIR_COUNT)"
            exit 1
          fi
          echo "  PASS: Counts match ($INDEX_COUNT)"

      - name: Check all opencode.json skill paths exist
        run: |
          echo "=== Checking opencode.json skill paths ==="
          # Extract paths to a temp file to avoid pipe subshell isolation
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('opencode.json', 'utf8'));
            const paths = [];
            for (const agent of Object.values(cfg.agent || {})) {
              if (agent.skill)  paths.push(agent.skill);
              if (agent.skills) paths.push(...agent.skills);
            }
            paths.forEach(p => console.log(p));
          " > /tmp/skill_paths.txt
          FAILED=0
          while read -r path; do
            if [ ! -f "$path" ]; then
              echo "  FAIL: Missing skill file referenced in opencode.json: $path"
              FAILED=1
            else
              echo "  PASS: $path"
            fi
          done < /tmp/skill_paths.txt
          [ "$FAILED" -eq 0 ] || exit 1

      - name: Validate graph node count matches index entry count
        run: |
          echo "=== Checking skill-graph.yaml node count ==="
          GRAPH_NODES=$(grep "total_nodes:" skills/graph/skill-graph.yaml | awk '{print $2}')
          INDEX_COUNT=$(grep -c "^- id:" skills/index.yaml || echo 0)
          echo "  graph total_nodes  : $GRAPH_NODES"
          echo "  index.yaml entries : $INDEX_COUNT"
          if [ "$GRAPH_NODES" -ne "$INDEX_COUNT" ]; then
            echo "  FAIL: Node count mismatch"
            exit 1
          fi
          echo "  PASS: Node counts match ($GRAPH_NODES)"

      - name: Check index.yaml version matches SKILL.md frontmatter version
        run: |
          echo "=== Checking index.yaml version vs SKILL.md frontmatter ==="
          pip install -q pyyaml 2>/dev/null || true
          python3 - <<'PYEOF'
          import re, sys

          with open("skills/index.yaml") as f:
              raw = f.read()

          blocks = raw.split("\n- id:")
          mismatches = []

          for block in blocks[1:]:
              skill_match   = re.search(r'executable_skill:\s*(.+)', block)
              version_match = re.search(r'(?m)^  version:\s*(.+)', block)
              if not skill_match or not version_match:
                  continue
              skill_path = skill_match.group(1).strip()
              idx_ver    = version_match.group(1).strip()
              try:
                  with open(skill_path) as sf:
                      content = sf.read()
                  m = re.search(r'^version:\s*(.+)$', content, re.MULTILINE)
                  skill_ver = m.group(1).strip().strip('"\'') if m else "MISSING"
              except FileNotFoundError:
                  skill_ver = "FILE_NOT_FOUND"
              if idx_ver != skill_ver:
                  mismatches.append(f"  FAIL: {skill_path}  index.yaml={idx_ver}  SKILL.md={skill_ver}")
              else:
                  print(f"  PASS: {skill_path}  ({idx_ver})")

          for m_line in mismatches:
              print(m_line)
          sys.exit(1 if mismatches else 0)
          PYEOF

      - name: Summary
        if: always()
        run: echo "=== Skill validation complete ==="
